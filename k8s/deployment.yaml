apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-minimal-api-deployment
  labels:
    app: dotnet-api
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: dotnet-api
  template:
    metadata:
      labels:
        app: dotnet-api
    spec:
      containers:
      - name: dotnet-api-container
        # কনফ্লিক্ট মার্কারগুলো সরিয়ে লেটেস্ট ইমেজ ট্যাগটি রাখুন
        image: puremahadi/devops-dotnet-simple-project:V16-139d0facef2e47040aec5ad07225756771d7740f
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development" # এটি আপনাকে বিস্তারিত এরর দেখাবে
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "256Mi"
            cpu: "200m"
          requests:
            memory: "128Mi"
            cpu: "100m"
