name: Build and Push Docker Image

on:
  push:
    branches:
      - main # আপনার ব্রাঞ্চের নাম master হলে এখানে master লিখে দিন

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: puremahadi
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        id: build_and_push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # আপনার চাহিদা মতো V ক্যাপিটাল, রান নম্বর এবং ফুল SHA ট্যাগ
          tags: puremahadi/devops-dotnet-simple-project:V${{ github.run_number }}-${{ github.sha }}

      - name: Update Kubernetes resources
        run: |
          # ইমেজ ট্যাগটি ভেরিয়েবলে সেট করা হয়েছে যাতে পরিবর্তন করা সহজ হয়
          IMAGE_TAG="V${{ github.run_number }}-${{ github.sha }}"
          
          # k8s/deployment.yaml ফাইলে নতুন ট্যাগটি আপডেট করবে
          sed -i "s|image: puremahadi/devops-dotnet-simple-project:.*|image: puremahadi/devops-dotnet-simple-project:$IMAGE_TAG|g" k8s/deployment.yaml
          
          # গিট কনফিগারেশন এবং পুশ
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add k8s/deployment.yaml
          git commit -m "Update image tag to $IMAGE_TAG [skip ci]"
          
          # পুশ করার আগে রিমোট থেকে লেটেস্ট কোড পুল করে নেওয়া (কনফ্লিক্ট এড়াতে)
          git pull origin main --rebase
          
          # এবার পুশ করা
          git push origin main

      - name: Image digest
        run: echo ${{ steps.build_and_push.outputs.digest }}
